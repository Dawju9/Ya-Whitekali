# Welcome Configuration - YaWhitekali Website
# Dynamiczny config welcome.sh

# ==========================
# INFORMACJE O PROJEKCIE
# ==========================

PROJECT_NAME="Ya Whitekali"
PROJECT_SHORT="whitekali"

PROJECT_DESC="Portfolio, sklep i strona usługowa z legacy website"

VERSION="2.0.0"
VERSION_DATE="2026-05-16"

# ==========================
# REPOZYTORIUM
# ==========================

GITHUB_REPO="twoj-user/Ya-Whitekali"
GITHUB_BRANCH="kalies"

# ==========================
# STACK
# ==========================

TECH_STACK=(
    "HTML5"
    "Bootstrap"
    "JavaScript"
    "CSS"
    "Markdown"
    "Static Website"
)

TECH_BRO=(
    "Bootstrap"
    "VanillaJS"
    "Responsive Design"
    "Landing Pages"
)

# ==========================
# KOLORY ANSI
# ==========================

COLOR_TITLE="35"      # Purple
COLOR_OK="32"         # Green
COLOR_WARN="33"       # Yellow
COLOR_ERR="31"        # Red
COLOR_INFO="36"       # Cyan

# ==========================
# IGNOROWANE
# ==========================

EXCLUDE_DIRS=(
    ".git"
    "node_modules"
    ".vscode"
    "__pycache__"
)

EXCLUDE_FILES=(
    "*.log"
    "*.tmp"
    "*.cache"
)

# ==========================
# MODUŁY PROJEKTU
# ==========================

PROJECT_MODULES=(
    "index-app.html:Main App Entry"
    "site/website/index.html:Homepage"
    "site/website/services.html:Services"
    "site/website/products.html:Products"
    "site/website/product.html:Product View"
    "site/website/pricing.html:Pricing"
    "site/website/portfolio.html:Portfolio"
    "site/website/projects.html:Projects"
    "site/website/team.html:Team"
    "site/website/testimonials.html:Testimonials"
    "site/website/login.html:Login"
    "site/website/signup.html:Register"
    "site/website/shopping-cart.html:Shopping Cart"
    "site/website/contacts.html:Contacts"
    "site/website/assets:Frontend Assets"
    "site/website/oldsite:Legacy Website"
)

# ==========================
# OPCJE WELCOME
# ==========================

SHOW_GIT=1
SHOW_SIZE=1
SHOW_FILES=1
SHOW_MODULES=1
SHOW_CONFIG=1
SHOW_ERRORS=0
SHOW_DEPS=1
SHOW_TREE=1

SHOW_HTML_STATS=1
SHOW_ASSETS=1
SHOW_PAGES=1
SHOW_LEGACY=1
SHOW_BOOTSTRAP=1

# ==========================
# ŚCIEŻKI
# ==========================

MAIN_ENTRY="site/website/index.html"
ASSETS_DIR="site/website/assets"
LEGACY_PATH="site/website/oldsite"

# ==========================
# HEALTH CHECK
# ==========================

HEALTH_CHECK_FILES=(
    "site/website/index.html"
    "site/website/assets"
    "site/website/login.html"
    "site/website/products.html"
)

# ==========================
# WELCOME MESSAGE
# ==========================

WELCOME_MESSAGE="
⚪ {PROJECT_NAME} v{VERSION}

🌐 {PROJECT_DESC}

📂 Lokalizacja: {DIR}
🌿 Branch: {GITHUB_BRANCH}
🗓️ Build: {VERSION_DATE}

━━━━━━━━━━━━━━━━━━━━━━
🧩 Website Structure
• Home        → index.html
• Products    → products.html
• Services    → services.html
• Portfolio   → portfolio.html
• Team        → team.html
• Sales       → sales.html
• Login/Auth  → login/signup
• Assets      → assets/
• Legacy Site → oldsite/
━━━━━━━━━━━━━━━━━━━━━━

⚡ Quick Commands:
site-tree      → pokaż strukturę
site-pages     → lista stron
site-assets    → asset statistics
legacy-open    → old website
html-check     → validate html
preview-site   → local preview

💡 Website project ready
"

# ==========================
# CUSTOM COMMANDS
# ==========================

CUSTOM_COMMANDS=(
    "site-tree:Struktura projektu"
    "site-pages:Lista stron HTML"
    "site-assets:Analiza assetów"
    "preview-site:Uruchom local preview"
    "html-check:Walidacja HTML"
    "bootstrap-check:Bootstrap status"
    "legacy-open:Wejdź do oldsite"
    "git-web:Status repo"
)

# ==========================
# AUTO-DETEKCJA
# ==========================

AUTO_DETECT_GIT=1
AUTO_DETECT_BOOTSTRAP=1
AUTO_DETECT_HTML=1
AUTO_DETECT_ASSETS=1
AUTO_DETECT_LEGACY=1 
