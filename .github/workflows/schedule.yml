name: Scheduled Build

on:
  schedule:
    - cron: "55 11 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p _site
          cp -r *.html assets/ oldsite/ linux-config/ about/ _site/ 2>/dev/null || true
          cp -r *.css *.js *.yml *.json *.xml *.md *.bsdesign docker-compose.yml robots.txt _site/ 2>/dev/null || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: _site/
