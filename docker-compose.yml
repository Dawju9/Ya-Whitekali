services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - n8n_default
      - n8n-stack

networks:
  n8n_default:
    external: true
  n8n-stack:
    external: true
